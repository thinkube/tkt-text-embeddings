apiVersion: thinkube.io/v1
kind: ThinkubeDeployment

spec:
  deployment:
    type: app

  containers:
    - name: embeddings
      build: .
      port: 7860
      size: xlarge
      gpu:
        count: 1
        memory: "8Gi"
      health: /health
      test:
        enabled: false

  routes:
    - path: /
      to: embeddings
